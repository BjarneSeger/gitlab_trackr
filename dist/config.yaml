version: 2
project_name: gitlab_trackr
release:
  github:
    owner: BjarneSeger
    name: gitlab_trackr
  name_template: '{{.Tag}}'
builds:
  - id: gitlab_trackrd
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
    dir: .
    main: .
    binary: gitlab-trackrd
    builder: rust
    tool: cargo
    command: zigbuild
    flags:
      - --release
      - --package=gitlab_trackrd
  - id: gitlab_trackr_cli
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
    dir: .
    main: .
    binary: tt
    builder: rust
    tool: cargo
    command: zigbuild
    flags:
      - --release
      - --package=tt_cli
archives:
  - id: gitlab_trackrd
    ids:
      - gitlab_trackrd
      - gitlab_trackr_cli
    builds_info:
      mode: 493
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    formats:
      - tar.gz
    files:
      - src: license*
      - src: LICENSE*
      - src: readme*
      - src: README*
      - src: changelog*
      - src: CHANGELOG*
nfpms:
  - file_name_template: '{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
    package_name: gitlab-trackr-utils
    contents:
      - src: tt_cli/completions/tt.bash
        dst: /usr/share/bash-completion/completions/tt
      - src: tt_cli/completions/_tt
        dst: /usr/share/zsh/site-functions/_tt
      - src: tt_cli/completions/tt.fish
        dst: /usr/share/fish/vendor_completions.d/tt.fish
      - src: tt_cli/completions/tt.yaml
        dst: /usr/share/carapace/specs/tt.yaml
      - src: gitlab_trackrd/packaging/gitlab_trackrd.service
        dst: /usr/lib/systemd/user/gitlab_trackrd.service
        file_info:
          mode: 420
      - src: gitlab_trackrd/packaging/gitlab_trackrd.socket
        dst: /usr/lib/systemd/user/gitlab_trackrd.socket
        file_info:
          mode: 420
    id: default
    ids:
      - gitlab_trackr_cli
      - gitlab_trackrd
    formats:
      - deb
      - rpm
      - archlinux
    maintainer: Bjarne Seger <bjarneseger@thehoster.org>
    description: GitLab time-tracking utils
    bindir: /usr/bin
    libdirs:
      header: /usr/include
      carchive: /usr/lib
      cshared: /usr/lib
srpm:
  nfpmrpm: {}
  package_name: gitlab_trackr
  file_name_template: '{{ .PackageName }}-{{ .Version }}.src.rpm'
  bins:
    gitlab_trackr: '%{goipath}'
snapshot:
  version_template: '{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}'
checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_checksums.txt'
  algorithm: sha256
docker_digest:
  name_template: digests.txt
changelog:
  format: '{{ .SHA }} {{ .Message }}'
dist: dist
env_files:
  github_token: ~/.config/goreleaser/github_token
  gitlab_token: ~/.config/goreleaser/gitlab_token
  gitea_token: ~/.config/goreleaser/gitea_token
source:
  name_template: '{{ .ProjectName }}-{{ .Version }}'
  format: tar.gz
gomod:
  gobinary: go
announce:
  twitter:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  mastodon:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    server: ""
  reddit:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    url_template: '{{ .ReleaseURL }}'
  slack:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    username: GoReleaser
  discord:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    author: GoReleaser
    color: "3888754"
    icon_url: https://goreleaser.com/static/avatar.png
  teams:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    color: '#2D313E'
    icon_url: https://goreleaser.com/static/avatar.png
  smtp:
    subject_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    body_template: 'You can view details from: {{ .ReleaseURL }}'
  mattermost:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    color: '#2D313E'
    username: GoReleaser
  linkedin:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  telegram:
    message_template: '{{ print .ProjectName " " .Tag " is out! Check it out at " .ReleaseURL | mdv2escape }}'
    parse_mode: MarkdownV2
  webhook:
    message_template: '{ "message": "{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}"}'
    content_type: application/json; charset=utf-8
    expected_status_codes:
      - 200
      - 201
      - 202
      - 204
  opencollective:
    title_template: '{{ .Tag }}'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out!<br/>Check it out at <a href="{{ .ReleaseURL }}">{{ .ReleaseURL }}</a>'
  bluesky:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  discourse:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    username: system
git:
  tag_sort: -version:refname
mcp:
  name: ""
  title: ""
  auth:
    type: none
retry:
  attempts: 10
  delay: 10s
  max_delay: 5m0s
github_urls:
  download: https://github.com
gitlab_urls:
  download: https://gitlab.com
