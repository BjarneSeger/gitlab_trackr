version: 2

project_name: gitlab_trackr

builds:
  - id: gitlab_trackrd
    binary: gitlab_trackrd
    builder: rust
    targets:
      - "x86_64-unknown-linux-gnu"
      - "aarch64-unknown-linux-gnu"
    command: zigbuild
    flags:
      - --release
      - --package=gitlab_trackrd
  - id: gitlab_trackr_cli
    binary: tt
    builder: rust
    targets:
      - "x86_64-unknown-linux-gnu"
      - "aarch64-unknown-linux-gnu"
    command: zigbuild
    flags:
      - --release
      - --package=tt_cli

archives:
  - id: gitlab_trackrd
    ids:
      - gitlab_trackrd
      - gitlab_trackr_cli
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: gitlab_trackrd
    package_name: gitlab-trackrd
    maintainer: Bjarne Seger <bjarneseger@thehoster.org>
    description: GitLab time-tracking varlink daemon
    formats:
      - deb
      - rpm
      - archlinux
    bindir: /usr/bin
    contents:
      - src: gitlab_trackrd/packaging/gitlab_trackrd.service
        dst: /usr/lib/systemd/user/gitlab_trackrd.service
        file_info:
          mode: 0644
    recommends:
      - "gitlab-trackr-cli"

  - id: gitlab_trackr_cli
    package_name: gitlab-trackr-cli
    maintainer: Bjarne Seger <bjarneseger@thehoster.org>
    description: GitLab time-tracking cli
    formats:
      - deb
      - rpm
      - archlinux
    bindir: /usr/bin
    dependencies:
      - "gitlab-trackrd"
    contents:
      - src: tt_cli/completions/tt.bash
        dst: /usr/share/bash-completion/completions/tt
      - src: tt_cli/completions/_tt
        dst: /usr/share/zsh/site-functions/_tt
      - src: tt_cli/completions/tt.fish
        dst: /usr/share/fish/vendor_completions.d/tt.fish
      - src: tt_cli/completions/tt.nu
        dst: /usr/share/nushell/vendor/autoload/tt.nu
