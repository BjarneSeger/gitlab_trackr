[package]
name = "tt_cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "tt"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4.6.1", features = ["derive"] }
confique = { version = "0.4.0", default-features = false, features = ["toml"] }
dirs = "5"
gitlab_trackr_api = { path = "../gitlab_trackr_api", version = "0.1.0" }
inquire = "0.9.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
varlink = { version = "13.0", features = ["tokio"] }
