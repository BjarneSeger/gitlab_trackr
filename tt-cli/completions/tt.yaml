# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: tt
description: GitLab time-tracking CLI
flags:
  -h, --help: Print help
  -V, --version: Print version
commands:
- name: list
  description: List issues assigned to you
  flags:
    -h, --help: Print help
- name: log
  description: Log time on an issue non-interactively
  flags:
    -h, --help: Print help
    -p, --project-id=: Project ID. If omitted, resolved from the last-used issue cache or by scanning your assigned issues for one matching `iid`
    -s, --summary=: Optional summary note
- name: prompt
  description: Interactively pick an issue and log time
  flags:
    -h, --help: Print help
- name: tick
  description: 'Hook entry: if enough time has elapsed, run the interactive prompt; otherwise exit silently'
  flags:
    -h, --help: Print help
- name: hook
  description: Print a shell snippet that wires `tt tick` into the pre-prompt hook
  flags:
    -h, --help: Print help
  completion:
    positional:
    - - fish
      - zsh
      - bash
      - nu
- name: refresh
  description: Tell the daemon to drop its cached issue list
  flags:
    -h, --help: Print help
- name: config
  description: Inspect or scaffold the user configuration file
  flags:
    -h, --help: Print help
  commands:
  - name: template
    description: Print an annotated TOML template (with current defaults and doc comments) to stdout. Pipe into `$XDG_CONFIG_HOME/gitlab_trackr_cli/config.toml`
    flags:
      -h, --help: Print help
  - name: path
    description: Print the resolved path to the user config file
    flags:
      -h, --help: Print help
  - name: help
    description: Print this message or the help of the given subcommand(s)
    commands:
    - name: template
      description: Print an annotated TOML template (with current defaults and doc comments) to stdout. Pipe into `$XDG_CONFIG_HOME/gitlab_trackr_cli/config.toml`
    - name: path
      description: Print the resolved path to the user config file
    - name: help
      description: Print this message or the help of the given subcommand(s)
- name: help
  description: Print this message or the help of the given subcommand(s)
  commands:
  - name: list
    description: List issues assigned to you
  - name: log
    description: Log time on an issue non-interactively
  - name: prompt
    description: Interactively pick an issue and log time
  - name: tick
    description: 'Hook entry: if enough time has elapsed, run the interactive prompt; otherwise exit silently'
  - name: hook
    description: Print a shell snippet that wires `tt tick` into the pre-prompt hook
  - name: refresh
    description: Tell the daemon to drop its cached issue list
  - name: config
    description: Inspect or scaffold the user configuration file
    commands:
    - name: template
      description: Print an annotated TOML template (with current defaults and doc comments) to stdout. Pipe into `$XDG_CONFIG_HOME/gitlab_trackr_cli/config.toml`
    - name: path
      description: Print the resolved path to the user config file
  - name: help
    description: Print this message or the help of the given subcommand(s)
